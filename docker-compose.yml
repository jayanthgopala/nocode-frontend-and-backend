services:
  exports-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: placement-exports
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - placement-network
      - dokploy-network
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      CORS_ORIGINS: ${CORS_ORIGINS}

      MAIN_BACKEND_URL: ${MAIN_BACKEND_URL}
      MAIN_BACKEND_VERIFY_PATH: ${MAIN_BACKEND_VERIFY_PATH}
      AUTH_HEADER_NAME: ${AUTH_HEADER_NAME:-Authorization}
      AUTH_HEADER_PREFIX: ${AUTH_HEADER_PREFIX:-Bearer}
      AUTH_USER_ID_FIELD: ${AUTH_USER_ID_FIELD:-user_id}
      AUTH_USER_EMAIL_FIELD: ${AUTH_USER_EMAIL_FIELD:-email}
      AUTH_USER_ROLE_FIELD: ${AUTH_USER_ROLE_FIELD:-role_name}
      ALLOWED_ROLES: ${ALLOWED_ROLES:-admin,tpo}

      NOCODB_URL: ${NOCODB_URL}
      NOCODB_TOKEN: ${NOCODB_TOKEN}
      NOCODB_BASE_ID: ${NOCODB_BASE_ID}

      MAX_TABLES_PER_EXPORT: ${MAX_TABLES_PER_EXPORT:-10}
      MAX_ROWS_PER_TABLE: ${MAX_ROWS_PER_TABLE:-100000}
      RATE_LIMIT_EXPORTS_PER_HOUR: ${RATE_LIMIT_EXPORTS_PER_HOUR:-10}
      RATE_LIMIT_LISTS_PER_HOUR: ${RATE_LIMIT_LISTS_PER_HOUR:-60}

      VERIFY_CACHE_TTL_SECONDS: ${VERIFY_CACHE_TTL_SECONDS:-0}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  placement-network:
    external: true
  dokploy-network:
    external: true
