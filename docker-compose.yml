services:
  exports-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: placement-exports
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - placement-network
      - dokploy-network
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      CORS_ORIGINS: ${CORS_ORIGINS}

      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      JWT_ISSUER: ${JWT_ISSUER:-placement-exports}
      ALLOWED_ROLES: ${ALLOWED_ROLES:-admin,tpo}
      USERS_JSON: ${USERS_JSON}

      NOCODB_URL: ${NOCODB_URL}
      NOCODB_TOKEN: ${NOCODB_TOKEN}
      NOCODB_BASE_ID: ${NOCODB_BASE_ID}

      MAX_TABLES_PER_EXPORT: ${MAX_TABLES_PER_EXPORT:-10}
      MAX_ROWS_PER_TABLE: ${MAX_ROWS_PER_TABLE:-100000}
      RATE_LIMIT_EXPORTS_PER_HOUR: ${RATE_LIMIT_EXPORTS_PER_HOUR:-10}
      RATE_LIMIT_LISTS_PER_HOUR: ${RATE_LIMIT_LISTS_PER_HOUR:-60}
      RATE_LIMIT_LOGIN_PER_15MIN: ${RATE_LIMIT_LOGIN_PER_15MIN:-10}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  placement-network:
    external: true
  dokploy-network:
    external: true
